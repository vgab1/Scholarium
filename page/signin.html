<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scholarium</title>
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css"
      integrity="sha512-MV7K8+y+gLIBoVD59lQIYicR65iaqukzvf/nwasF0nqhPay5w/9lJmVM2hMDcnK1OnMGCdVK+iQrJ7lzPJQd1w=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Favicons -->
    <link
      rel="shortcut icon"
      href="/assets/img/favicon.ico"
      type="image/x-icon"
    />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Lato:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Roboto:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <!-- CSS -->
    <link rel="stylesheet" href="/assets/css/signin.css" />
    <!-- JavaScript -->
    <script src="/assets/js/signin.js" defer></script>
  </head>
  <header class="container">
    <a href="#">
      <img
        width="100"
        height="100"
        src="/assets/img/logo.png"
        alt="logo app"
      />
    </a>
  </header>
  <body>
    <div id="main-container">
      <h1>Cadastre-se para acessar o sistema</h1>
      <form id="register-form">
        <div class="full-box">
          <label for="email">E-mail</label>
          <input
            type="email"
            name="email"
            id="email"
            placeholder="Digite seu email"
            data-min-length="3"
            data-required
            data-email-validate
          />
        </div>
        <div class="half-box spacing">
          <label for="name">Nome</label>
          <input
            type="text"
            name="name"
            id="name"
            placeholder="Digite o seu nome"
            data-max-length="16"
            data-only-letters
          />
        </div>
        <div class="half-box">
          <label for="lastname">Sobrenome</label>
          <input
            type="text"
            name="lastname"
            id="lastname"
            placeholder="Digite o seu sobrenome"
          />
        </div>
        <div class="half-box spacing">
          <label for="password">Senha</label>
          <input
            type="password"
            name="password"
            id="password"
            placeholder="Digite a sua senha"
            data-min-length="6"
            data-required
            data-password-validate
          />
        </div>
        <div class="half-box">
          <label for="passconfirmation">Confirmação de Senha</label>
          <input
            type="password"
            name="passconfirmation"
            id="passconfirmation"
            placeholder="Confirme a sua senha"
            data-equal="password"
            data-required
          />
        </div>
        <div class="full-box">
          <input type="checkbox" name="agreement" id="agreement" />
          <label for="agreement" id="agreement-label"
            >Eu li e aceito os <a href="#">termos de uso</a></label
          >
        </div>
        <div class="full-box">
          <input type="submit" id="btn-submit" value="Registrar" />
        </div>
      </form>
      <a id="back" href="/index.html">Voltar</a>
    </div>
    <p class="error-validation template"></p>
  </body>
</html>
